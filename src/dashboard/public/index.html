<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Satriales Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0e1a;
  --bg-card: #121828;
  --bg-elev: #1a2236;
  --bg-input: #0f1523;
  --border: #252d3f;
  --border-strong: #334055;
  --text: #e7e9f0;
  --text-dim: #8b93a8;
  --text-mute: #5d6478;
  --accent: #4c7dff;
  --green: #2ecc71;
  --red: #e74c3c;
  --yellow: #f39c12;
  --cyan: #3ab7d4;
  --purple: #9b59b6;
  --orange: #e67e22;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; font-size: 13px; line-height: 1.5; }
body { padding: 18px 24px 48px; min-height: 100vh; max-width: 1600px; margin: 0 auto; }

/* ── Header ─────────────────────────────────────────────────────── */
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
header h1 { font-size: 19px; font-weight: 600; letter-spacing: -0.02em; }
header h1 .sub { color: var(--text-dim); font-weight: 400; margin-left: 10px; font-size: 13px; }
.status-pills { display: flex; gap: 10px; align-items: center; font-size: 12px; }
.pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 6px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); }
.pill .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--text-mute); }
.pill.ok .dot { background: var(--green); box-shadow: 0 0 6px rgba(46,204,113,0.5); }
.pill.bad .dot { background: var(--red); }
.pill.warn .dot { background: var(--yellow); }
.pill strong { color: var(--text); font-weight: 500; }

/* ── Top cards ──────────────────────────────────────────────────── */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 10px; margin-bottom: 18px; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.card .label { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 4px; font-weight: 500; }
.card .value { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.card .sub { color: var(--text-dim); font-size: 11px; margin-top: 3px; }

/* ── Bot chips row ──────────────────────────────────────────────── */
.bot-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
@media (max-width: 760px) { .bot-row { grid-template-columns: 1fr; } }
.bot-chip { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.bot-chip header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: nowrap; }
.bot-chip h3 { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.bot-chip .bot-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; font-size: 11px; }
.bot-chip .bot-meta .m-label { color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; }
.bot-chip .bot-meta .m-value { font-weight: 500; font-variant-numeric: tabular-nums; margin-top: 2px; }

/* ── Sections ───────────────────────────────────────────────────── */
section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; margin-bottom: 16px; }
section > header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; border: none; padding: 0; }
section h2 { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
section h2 .count { color: var(--text); margin-left: 4px; }

/* ── Filters ────────────────────────────────────────────────────── */
.filters { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.filters label { color: var(--text-dim); font-size: 11px; display: flex; flex-direction: column; gap: 4px; }
.filters select, .filters input[type="text"], .filters input[type="number"] {
  background: var(--bg-input); color: var(--text); border: 1px solid var(--border);
  padding: 5px 8px; border-radius: 5px; font-size: 12px; font-family: inherit;
  min-width: 110px;
}
.filters select:focus, .filters input:focus { outline: none; border-color: var(--accent); }
.filters button { background: var(--bg-elev); color: var(--text); border: 1px solid var(--border); padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }
.filters button:hover { border-color: var(--accent); }

/* ── Tables ─────────────────────────────────────────────────────── */
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; color: var(--text-dim); font-weight: 500; padding: 7px 9px; border-bottom: 1px solid var(--border); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
td { padding: 8px 9px; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(76,125,255,0.04); }
td.num { text-align: right; }
.bracket { display: inline-block; padding: 2px 7px; border-radius: 4px; background: var(--bg-elev); font-size: 11px; font-family: 'SF Mono', Menlo, monospace; }
.tag { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
.tag-intrinsic { background: rgba(76,125,255,0.15); color: #8cacff; border: 1px solid rgba(76,125,255,0.3); }
.tag-ensemble  { background: rgba(155,89,182,0.15); color: #c098d6; border: 1px solid rgba(155,89,182,0.3); }
.tag-orphan    { background: rgba(243,156,18,0.15); color: #f5b867; border: 1px solid rgba(243,156,18,0.3); }
.tag-external  { background: rgba(93,100,120,0.18); color: #a7aec2; border: 1px solid rgba(93,100,120,0.35); }
.tag-pending-win   { background: rgba(46,204,113,0.18); color: #7dd9a4; border: 1px solid rgba(46,204,113,0.35); }
.tag-pending-loss  { background: rgba(231,76,60,0.15); color: #f0a095; border: 1px solid rgba(231,76,60,0.3); }
tr.pending-win  td { background: rgba(46,204,113,0.04); }
tr.pending-loss td { background: rgba(231,76,60,0.03); }
.tag-unknown   { background: var(--bg-elev); color: var(--text-dim); }
.hint { display: inline-block; margin-left: 6px; font-size: 10px; color: var(--text-mute); font-style: italic; }
.summary-row { display: flex; gap: 18px; flex-wrap: wrap; font-size: 11px; color: var(--text-dim); margin-bottom: 10px; padding: 8px 10px; background: var(--bg-elev); border-radius: 5px; }
.summary-row .s-val { color: var(--text); font-weight: 500; font-variant-numeric: tabular-nums; }
.tag-yes       { background: rgba(46,204,113,0.15); color: #7dd9a4; border: 1px solid rgba(46,204,113,0.3); }
.tag-no        { background: rgba(231,76,60,0.15); color: #f0a095; border: 1px solid rgba(231,76,60,0.3); }

.green { color: var(--green); }
.red { color: var(--red); }
.yellow { color: var(--yellow); }
.cyan { color: var(--cyan); }
.dim { color: var(--text-dim); }
.mute { color: var(--text-mute); }
.empty { color: var(--text-dim); text-align: center; padding: 28px; font-style: italic; font-size: 12px; }

/* ── Forecast vs market bars ────────────────────────────────────── */
.forecast-row { display: grid; grid-template-columns: 80px 1fr 85px 85px 70px; gap: 8px; align-items: center; padding: 6px 4px; border-bottom: 1px solid var(--border); font-size: 12px; }
.forecast-row:last-child { border-bottom: none; }
.forecast-row.hl { background: rgba(76,125,255,0.06); border-radius: 4px; }
.bar-wrap { position: relative; height: 18px; background: var(--bg-input); border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
.bar-model { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); opacity: 0.6; }
.bar-market { position: absolute; top: 0; left: 0; height: 100%; background: var(--orange); opacity: 0.6; }
.bar-both { position: absolute; top: 0; left: 0; height: 8px; }
.bar-both.model { background: var(--accent); top: 0; }
.bar-both.market { background: var(--orange); top: 10px; }
.edge-pos { color: var(--green); font-weight: 500; }
.edge-neg { color: var(--red); font-weight: 500; }

/* ── Equity chart ──────────────────────────────────────────────── */
#equity-wrap { position: relative; height: 260px; }

/* ── Utility ────────────────────────────────────────────────────── */
.row-gap { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
.kalshi-missing { padding: 22px; text-align: center; background: var(--bg-elev); border-radius: 6px; color: var(--yellow); font-size: 12px; }
.legend { display: flex; gap: 12px; font-size: 11px; color: var(--text-dim); }
.legend .sw { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }
</style>
</head>
<body>

<header>
  <h1>Satriales <span class="sub">Kalshi weather trading</span></h1>
  <div class="status-pills">
    <div class="pill" id="pill-kalshi"><span class="dot"></span><span id="pill-kalshi-text">Kalshi…</span></div>
    <div class="pill" id="pill-updated"><span id="pill-updated-text">updated —</span></div>
  </div>
</header>

<!-- Top metric cards -->
<div class="cards" id="top-cards"></div>

<!-- Per-bot status -->
<div class="bot-row" id="bot-row"></div>

<!-- Forecast vs Market (the alpha view) -->
<section>
  <header>
    <h2>Model forecast vs market</h2>
    <div class="filters">
      <label>City
        <select id="fc-city"></select>
      </label>
      <label>Days ahead
        <select id="fc-days">
          <option value="0">Today</option>
          <option value="1" selected>Tomorrow</option>
          <option value="2">+2d</option>
          <option value="3">+3d</option>
        </select>
      </label>
      <button id="fc-refresh">Refresh</button>
    </div>
  </header>
  <div id="forecast-panel"></div>
</section>

<!-- Open positions -->
<section>
  <header>
    <h2>Open positions <span class="count" id="positions-count">—</span></h2>
    <div class="filters">
      <label>Bot
        <select id="pos-bot">
          <option value="all">All</option>
          <option value="managed">Managed (both bots)</option>
          <option value="intrinsic">Intrinsic</option>
          <option value="ensemble">Ensemble</option>
          <option value="orphan">Orphans (weather, untracked)</option>
          <option value="external">External (non-weather)</option>
        </select>
      </label>
      <label>City
        <input type="text" id="pos-city" placeholder="e.g. NY">
      </label>
      <label>Side
        <select id="pos-side">
          <option value="all">Both</option>
          <option value="yes">YES</option>
          <option value="no">NO</option>
        </select>
      </label>
      <label>Sort
        <select id="pos-sort">
          <option value="closes">Closes soonest</option>
          <option value="ev-desc">Expected P&amp;L ↓</option>
          <option value="ev-asc">Expected P&amp;L ↑</option>
          <option value="pnl-desc">Unreal. P&amp;L ↓</option>
          <option value="pnl-asc">Unreal. P&amp;L ↑</option>
          <option value="exposure">Exposure</option>
        </select>
      </label>
    </div>
  </header>
  <div id="positions-summary"></div>
  <div id="positions-body"></div>
</section>

<!-- Forecast coverage on open positions -->
<section>
  <header>
    <h2>Forecast coverage on open positions <span class="count" id="coverage-count">—</span></h2>
    <span class="dim" style="font-size:11px">Current 82-member GFS+ECMWF ensemble re-run every refresh</span>
  </header>
  <div id="coverage-body"></div>
</section>

<!-- Resting orders -->
<section>
  <header><h2>Resting orders <span class="count" id="orders-count">—</span></h2></header>
  <div id="orders-body"></div>
</section>

<!-- Trade history -->
<section>
  <header>
    <h2>Trade history <span class="count" id="trades-count">—</span></h2>
    <div class="filters">
      <label>Bot
        <select id="tr-bot">
          <option value="all">All</option>
          <option value="intrinsic">Intrinsic</option>
          <option value="ensemble">Ensemble</option>
        </select>
      </label>
      <label>City
        <input type="text" id="tr-city" placeholder="e.g. NY">
      </label>
      <label>Outcome
        <select id="tr-outcome">
          <option value="">All</option>
          <option value="win">Wins</option>
          <option value="loss">Losses</option>
          <option value="open">Open</option>
        </select>
      </label>
      <label>Limit
        <select id="tr-limit">
          <option value="50">50</option>
          <option value="200" selected>200</option>
          <option value="1000">1000</option>
        </select>
      </label>
    </div>
  </header>
  <div id="trades-body"></div>
</section>

<!-- Equity curve -->
<section>
  <header>
    <h2>Equity curve <span class="count" id="equity-hint"></span></h2>
    <div class="filters">
      <label>View
        <select id="eq-view">
          <option value="kalshi">Kalshi account (live)</option>
          <option value="pnl-combined">Cumulative P&amp;L (both bots)</option>
          <option value="pnl-per-bot">Cumulative P&amp;L (per bot)</option>
        </select>
      </label>
    </div>
  </header>
  <div class="legend" id="equity-legend" style="margin-bottom:8px"></div>
  <div id="equity-wrap"><canvas id="equity-chart"></canvas></div>
  <div class="dim" id="equity-caption" style="font-size:11px;margin-top:8px"></div>
</section>

<script>
// ─── Formatting helpers ───────────────────────────────────────────────
// Attribution tag with optional orphan-pattern hint
const attributionTag = p => {
  const t = `<span class="tag tag-${p.bot}">${p.bot === 'orphan' ? 'orphan' : p.bot === 'external' ? 'external' : p.bot}</span>`;
  if (p.bot === 'orphan' && p.orphanHint && p.orphanHint !== 'unclear') {
    const pretty = p.orphanHint === 'likely-intrinsic' ? 'looks intrinsic' : 'looks ensemble';
    return t + `<span class="hint">${pretty}</span>`;
  }
  return t;
};

const fmt = {
  money: n => (n == null || !isFinite(n)) ? '—' : (n < 0 ? '-$' : '$') + Math.abs(n).toFixed(2),
  moneyPos: n => (n == null || !isFinite(n)) ? '—' : (n > 0 ? '+' : '') + fmt.money(n),
  pct: n => (n == null || !isFinite(n)) ? '—' : (n * 100).toFixed(1) + '%',
  pct0: n => (n == null || !isFinite(n)) ? '—' : (n * 100).toFixed(0) + '%',
  temp: n => (n == null || !isFinite(n)) ? '—' : n.toFixed(1) + '°F',
  hours: n => n == null ? '—' : n < 1 ? Math.round(n * 60) + 'm' : n < 24 ? n.toFixed(1) + 'h' : (n/24).toFixed(1) + 'd',
  uptime: sec => {
    if (sec == null) return '—';
    if (sec < 60) return sec + 's';
    if (sec < 3600) return Math.floor(sec/60) + 'm ' + (sec%60) + 's';
    if (sec < 86400) return Math.floor(sec/3600) + 'h ' + Math.floor((sec%3600)/60) + 'm';
    return Math.floor(sec/86400) + 'd ' + Math.floor((sec%86400)/3600) + 'h';
  },
  ago: iso => {
    if (!iso) return '—';
    const d = typeof iso === 'number' ? new Date(iso) : new Date(iso);
    const s = Math.floor((Date.now() - d.getTime()) / 1000);
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago';
    return Math.floor(s/86400) + 'd ago';
  },
  iso2local: iso => iso ? new Date(iso).toLocaleString(undefined, { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }) : '—',
};
const pnlClass = n => n == null ? 'dim' : n > 0 ? 'green' : n < 0 ? 'red' : 'dim';
const botTag = k => `<span class="tag tag-${k}">${k === 'unknown' ? '?' : k}</span>`;
const sideTag = s => s === 'yes' ? '<span class="tag tag-yes">YES</span>' : '<span class="tag tag-no">NO</span>';

// ─── State bundle ─────────────────────────────────────────────────────
const app = {
  bots: null,      // /api/bots response
  portfolio: null, // /api/portfolio
  positions: [],   // /api/positions
  orders: [],      // /api/orders
  trades: [],      // /api/trades
  equity: null,    // /api/equity
  forecast: null,  // /api/forecast (last fetched)
  cities: [],      // /api/cities
  equityChart: null,
};

// ─── Fetch helpers ────────────────────────────────────────────────────
async function fetchJson(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

// ─── Top cards ────────────────────────────────────────────────────────
function renderTopCards() {
  const el = document.getElementById('top-cards');
  const p = app.portfolio;
  const b = app.bots?.bots ?? [];
  const intrinsicBot = b.find(x => x.name === 'intrinsic');
  const ensembleBot = b.find(x => x.name === 'ensemble');
  const totalRealized = (intrinsicBot?.totals?.totalPnl ?? 0) + (ensembleBot?.totals?.totalPnl ?? 0);
  const totalWins = (intrinsicBot?.totals?.wins ?? 0) + (ensembleBot?.totals?.wins ?? 0);
  const totalLosses = (intrinsicBot?.totals?.losses ?? 0) + (ensembleBot?.totals?.losses ?? 0);
  const wr = (totalWins + totalLosses) > 0 ? totalWins / (totalWins + totalLosses) : null;

  // Two ways to compute "unrealized P&L":
  //   - Bid-based: sum of (mark × shares − cost) per position. Optimistic
  //     because bid × shares overstates exit value when bid sizes are thin,
  //     and counts pending-settlement winners at full $0.99 mark.
  //   - Kalshi-derived: portfolio_value − cash − cost. Matches Kalshi's own
  //     marked-to-market accounting, which excludes decided-but-pending
  //     winners until they actually settle. More conservative, more accurate
  //     as a snapshot of "what's in your account right now."
  const unrealizedBid = app.positions.reduce((s, p) => s + (p.unrealizedPnlUSD ?? 0), 0);
  const unrealizedKalshi = (p?.configured && p?.portfolioValueUSD != null && p?.totalDeployedUSD != null)
    ? (p.portfolioValueUSD - p.cashUSD - p.totalDeployedUSD)
    : null;
  const unrealized = unrealizedKalshi ?? unrealizedBid; // primary (used elsewhere too)
  const todayPnlI = intrinsicBot?.daily?.dailyPnl ?? 0;
  const todayPnlE = ensembleBot?.daily?.dailyPnl ?? 0;
  const todayPnl = todayPnlI + todayPnlE;
  // Total P&L: realized (audit-corrected) + Kalshi-derived unrealized.
  // We also expose the post-settlement projection (bid-based) since pending
  // winners are real money that will land in cash within hours.
  const totalPnlNow = totalRealized + (unrealizedKalshi ?? unrealizedBid);
  const totalPnlPostSettle = totalRealized + unrealizedBid;

  const cashText = p?.configured ? fmt.money(p.cashUSD) : '—';
  const pvText = p?.configured ? fmt.money(p.portfolioValueUSD) : '—';

  el.innerHTML = `
    <div class="card">
      <div class="label">Cash balance</div>
      <div class="value">${cashText}</div>
      <div class="sub">${p?.configured ? 'Kalshi account' : 'Kalshi not configured'}</div>
    </div>
    <div class="card">
      <div class="label">Portfolio value</div>
      <div class="value">${pvText}</div>
      <div class="sub">cash + open positions (mark)</div>
    </div>
    <div class="card">
      <div class="label">Deployed</div>
      <div class="value">${p?.configured ? fmt.money(p.totalDeployedUSD) : '—'}</div>
      <div class="sub">${p?.openPositionCount ?? 0} open positions</div>
    </div>
    <div class="card" title="Unrealized P&L if you exited at top-of-book bids right now. Optimistic when bid sizes are thin or when winners are decided-but-pending settlement.">
      <div class="label">Unrealized (bid)</div>
      <div class="value ${pnlClass(unrealizedBid)}">${fmt.moneyPos(unrealizedBid)}</div>
      <div class="sub">${unrealizedKalshi != null ? `Kalshi-marked: <span class="${pnlClass(unrealizedKalshi)}">${fmt.moneyPos(unrealizedKalshi)}</span>` : 'marked at bid'}</div>
    </div>
    <div class="card">
      <div class="label">Today's P&amp;L</div>
      <div class="value ${pnlClass(todayPnl)}">${fmt.moneyPos(todayPnl)}</div>
      <div class="sub">${(intrinsicBot?.daily?.closedToday ?? 0) + (ensembleBot?.daily?.closedToday ?? 0)} resolved · I ${fmt.moneyPos(todayPnlI)} · E ${fmt.moneyPos(todayPnlE)}</div>
    </div>
    <div class="card" title="Realized + Kalshi-marked unrealized = ground-truth current P&L. The 'post-settle' figure adds back pending winners at full mark — what total will be once Kalshi settles them.">
      <div class="label">Total P&amp;L${unrealizedKalshi != null ? ' (Kalshi)' : ''}</div>
      <div class="value ${pnlClass(totalPnlNow)}">${fmt.moneyPos(totalPnlNow)}</div>
      <div class="sub">realized ${fmt.moneyPos(totalRealized)} · ${unrealizedKalshi != null ? `post-settle ~<span class="${pnlClass(totalPnlPostSettle)}">${fmt.moneyPos(totalPnlPostSettle)}</span>` : `unreal ${fmt.moneyPos(unrealizedBid)}`}</div>
    </div>
    ${(() => {
      const s = app.positionsSummary;
      if (!s || (s.pendingWinsCount === 0 && s.pendingLossesCount === 0)) return '';
      const wins = s.pendingWinsCount ?? 0;
      const losses = s.pendingLossesCount ?? 0;
      const payout = s.pendingPayoutUSD ?? 0;
      const lossExp = s.pendingLossExposureUSD ?? 0;
      return `
        <div class="card" style="border-color:rgba(243,156,18,0.45);background:linear-gradient(180deg,rgba(243,156,18,0.05),var(--bg-card))">
          <div class="label">⏳ Pending settlement</div>
          <div class="value yellow">${fmt.money(payout)}</div>
          <div class="sub">${wins} winner${wins===1?'':'s'} (~${fmt.money(payout)} into cash) · ${losses} loser${losses===1?'':'s'} (${fmt.money(lossExp)} written off)</div>
        </div>
      `;
    })()}
    <div class="card">
      <div class="label">Session win rate</div>

    return;
  }
  const mk = d.marketLeader, ml = d.modelLeader, be = d.bestEdge;
  const agreeIcon = d.agreement ? '<span class="green">✓ agree</span>' : '<span class="yellow">✗ disagree</span>';
  const e = d.ensemble;

  const header = `
    <div class="row-gap" style="margin-bottom:12px;padding:10px;background:var(--bg-elev);border-radius:6px">
      <div><div class="m-label dim" style="font-size:10px;text-transform:uppercase">Model (${d.memberCount}-member ${d.modelsUsed ?? 'ensemble'})</div>
        <div style="font-size:16px;font-weight:600">${e ? `${fmt.temp(e.mean)} <span class="dim" style="font-size:12px">±${e.stddev.toFixed(1)}°</span>` : '—'}</div>
        ${e ? `<div class="dim" style="font-size:11px">p10 ${fmt.temp(e.p10)} · p90 ${fmt.temp(e.p90)}</div>` : ''}
      </div>
      <div><div class="m-label dim" style="font-size:10px;text-transform:uppercase">Market leader</div>
        <div style="font-size:14px;font-weight:500">${mk ? `<span class="bracket">${mk.label}</span> @ $${mk.yesAsk.toFixed(2)}` : '—'}</div>
        <div class="dim" style="font-size:11px">implied ${fmt.pct0(mk?.impliedProb)}</div>
      </div>
      <div><div class="m-label dim" style="font-size:10px;text-transform:uppercase">Model leader</div>
        <div style="font-size:14px;font-weight:500">${ml ? `<span class="bracket">${ml.label}</span> <span class="dim">${fmt.pct0(ml.modelProb)}</span>` : '—'}</div>
        <div style="font-size:11px">${agreeIcon}</div>
      </div>
      <div><div class="m-label dim" style="font-size:10px;text-transform:uppercase">Best edge</div>
        <div style="font-size:14px;font-weight:500">${be ? `<span class="bracket">${be.label}</span>` : '—'}</div>
        <div style="font-size:11px">${be ? `<span class="edge-${be.edge >= 0 ? 'pos' : 'neg'}">${fmt.pct(be.edge)}</span> @ $${be.yesAsk.toFixed(2)}` : '—'}</div>
      </div>
      <div><div class="m-label dim" style="font-size:10px;text-transform:uppercase">Closes</div>
        <div style="font-size:13px">${fmt.iso2local(d.closeTime)}</div>
        <div class="dim" style="font-size:11px">${fmt.hours(d.closeTime ? (new Date(d.closeTime).getTime() - Date.now())/3600000 : null)}</div>
      </div>
    </div>
  `;

  const rows = [
    `<div class="forecast-row" style="font-weight:500;border-bottom:1px solid var(--border-strong)">
      <div class="dim" style="font-size:10px;text-transform:uppercase">Bracket</div>
      <div class="dim" style="font-size:10px;text-transform:uppercase">Model prob (blue) vs Market (orange)</div>
      <div class="dim" style="font-size:10px;text-transform:uppercase;text-align:right">Model</div>
      <div class="dim" style="font-size:10px;text-transform:uppercase;text-align:right">Mkt ask</div>
      <div class="dim" style="font-size:10px;text-transform:uppercase;text-align:right">Edge</div>
    </div>`,
  ];
  for (const b of d.brackets) {
    const mp = Math.max(0, Math.min(1, b.modelProb)) * 100;
    const mk = Math.max(0, Math.min(1, b.impliedProb)) * 100;
    const isBestEdge = be && b.label === be.label;

  }

  panel.innerHTML = header + rows.join('');

// ─── Positions table ─────────────────────────────────────────────────
function renderPositions() {
  const el = document.getElementById('positions-body');
  const summaryEl = document.getElementById('positions-summary');
  const countEl = document.getElementById('positions-count');
  let pos = [...app.positions];
  const botFilter = document.getElementById('pos-bot').value;
  const cityFilter = (document.getElementById('pos-city').value ?? '').trim().toLowerCase();
  const sideFilter = document.getElementById('pos-side').value;
  const sort = document.getElementById('pos-sort').value;

  if (botFilter === 'managed') pos = pos.filter(p => p.bot === 'intrinsic' || p.bot === 'ensemble');
  else if (botFilter !== 'all') pos = pos.filter(p => p.bot === botFilter);
  if (cityFilter) pos = pos.filter(p => (p.city ?? '').toLowerCase().includes(cityFilter));
  if (sideFilter !== 'all') pos = pos.filter(p => p.side === sideFilter);
  if (sort === 'closes') pos.sort((a,b) => (a.hoursToClose ?? 999) - (b.hoursToClose ?? 999));
  else if (sort === 'ev-desc') pos.sort((a,b) => (b.expectedValueUSD ?? -9999) - (a.expectedValueUSD ?? -9999));
  else if (sort === 'ev-asc') pos.sort((a,b) => (a.expectedValueUSD ?? 9999) - (b.expectedValueUSD ?? 9999));
  else if (sort === 'pnl-desc') pos.sort((a,b) => (b.unrealizedPnlUSD ?? 0) - (a.unrealizedPnlUSD ?? 0));
  else if (sort === 'pnl-asc') pos.sort((a,b) => (a.unrealizedPnlUSD ?? 0) - (b.unrealizedPnlUSD ?? 0));
  else if (sort === 'exposure') pos.sort((a,b) => (b.exposureUSD ?? 0) - (a.exposureUSD ?? 0));

  countEl.textContent = `(${pos.length})`;

  // Summary chip (shows TOTALS, not filtered counts — so you can see at a glance
  // what's actively managed vs what's leftover from old sessions vs what isn't ours)
  const s = app.positionsSummary;
  if (s && app.positions.length > 0) {
    const orphanLabel = s.orphan > 0 ? `<span class="s-val yellow">${s.orphan}</span> orphan (${fmt.money(s.orphanExposureUSD)})` : '<span class="s-val">0</span> orphan';
    const externalLabel = s.external > 0 ? `<span class="s-val mute">${s.external}</span> external (${fmt.money(s.externalExposureUSD)})` : '<span class="s-val">0</span> external';
    summaryEl.innerHTML = `
      <div class="summary-row">
        <span><span class="s-val">${s.managed}</span> managed <span class="mute">(${s.intrinsic} intrinsic, ${s.ensemble} ensemble)</span></span>
        <span>${orphanLabel}</span>
        <span>${externalLabel}</span>
      </div>
    `;
  } else {
    summaryEl.innerHTML = '';
  }

  if (pos.length === 0) { el.innerHTML = '<div class="empty">No positions match these filters</div>'; return; }

  const rows = pos.map(p => {
    // Effective model prob — if side is NO, the winning prob is 1 - bracketHitProb
    const winProb = p.modelProb == null ? null : (p.side === 'yes' ? p.modelProb : 1 - p.modelProb);
    const evClass = p.expectedValueUSD == null ? 'dim' : pnlClass(p.expectedValueUSD);
    const settle = p.settlementStatus;
    const rowCls = settle === 'pending-win' ? 'pending-win' : settle === 'pending-loss' ? 'pending-loss' : '';
    const settleTag = settle === 'pending-win'
      ? '<span class="tag tag-pending-win" title="Mark ≥ $0.95 — effectively a win, awaiting Kalshi settlement">⏳ pending win</span>'
      : settle === 'pending-loss'
      ? '<span class="tag tag-pending-loss" title="Mark ≤ $0.05 — effectively a loss, awaiting close">⏳ pending loss</span>'
      : '';
    return `
    <tr class="${rowCls}">
      <td>${attributionTag(p)}${settleTag ? ' '+settleTag : ''}</td>
      <td><code style="font-size:11px">${p.ticker}</code></td>
      <td>${p.city ?? '—'}</td>
      <td>${p.bracketText ? '<span class="bracket">'+p.bracketText+'</span>' : '—'}</td>
      <td>${sideTag(p.side)}</td>
      <td class="num">${p.shares.toFixed(0)}</td>
      <td class="num">$${p.avgEntryPrice.toFixed(3)}</td>
      <td class="num">$${p.markPrice.toFixed(3)}</td>
      <td class="num">${fmt.money(p.exposureUSD)}</td>
      <td class="num ${pnlClass(p.unrealizedPnlUSD)}">${fmt.moneyPos(p.unrealizedPnlUSD)}</td>
      <td class="num ${winProb == null ? 'dim' : ''}">${winProb == null ? '—' : fmt.pct0(winProb)}</td>
      <td class="num ${evClass}">${fmt.moneyPos(p.expectedValueUSD ?? null)}</td>
      <td class="num dim">${fmt.hours(p.hoursToClose)}</td>
    </tr>
  `;}).join('');

  el.innerHTML = `
    <table>
      <thead><tr>
        <th>Bot</th><th>Ticker</th><th>City</th><th>Bracket</th><th>Side</th>
        <th class="num">Shares</th><th class="num">Avg</th><th class="num">Mark</th>
        <th class="num">Cost</th><th class="num">Unreal.</th>
        <th class="num" title="Model probability this position wins">Win prob</th>
        <th class="num" title="Expected P&L on resolution, net of Kalshi 7% winnings fee">Exp. P&amp;L</th>
        <th class="num">Closes</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

// ─── Forecast coverage on open positions ─────────────────────────────
// One card per (city, date) that we have positions on. Each card shows:
//   - Ensemble mean ± stddev (with p10-p90 range)
//   - Every position we hold on that market, with modelProb + winProb + EV
//   - A small bar indicating whether the ensemble mean falls INSIDE our bracket
function renderCoverage() {
  const el = document.getElementById('coverage-body');
  const countEl = document.getElementById('coverage-count');
  const withForecast = app.positions.filter(p => p.forecast && p.modelProb != null);

  if (withForecast.length === 0) {
    countEl.textContent = '';
    el.innerHTML = '<div class="empty">No open positions with forecast data</div>';
    return;
  }

  // Group by eventTicker (= one Kalshi market event = one (city, date) pair)
  const groups = new Map();
  for (const p of withForecast) {
    const key = p.eventTicker || (p.city + '-' + (p.closeTime ?? ''));
    if (!groups.has(key)) {
      groups.set(key, {
        eventTicker: p.eventTicker,
        city: p.city,
        closeTime: p.closeTime,
        hoursToClose: p.hoursToClose,
        forecast: p.forecast, // same ensemble for all positions in this event
        positions: [],
      });
    }
    groups.get(key).positions.push(p);
  }

  countEl.textContent = `(${groups.size} market${groups.size === 1 ? '' : 's'})`;

  const cards = [];
  const groupArr = Array.from(groups.values()).sort((a, b) => (a.hoursToClose ?? 999) - (b.hoursToClose ?? 999));

  for (const g of groupArr) {
    const f = g.forecast;
    const totalExp = g.positions.reduce((s, p) => s + (p.exposureUSD ?? 0), 0);
    const totalEV = g.positions.reduce((s, p) => s + (p.expectedValueUSD ?? 0), 0);

    // Ranges for the forecast bar (use p10-p90 as visual extent)
    const lo = Math.min(f.p10 - 1, ...g.positions.map(p => p.bracketRange?.lowF ?? f.p10).filter(isFinite));
    const hi = Math.max(f.p90 + 1, ...g.positions.map(p => p.bracketRange?.highF ?? f.p90).filter(isFinite));
    const span = Math.max(1, hi - lo);
    const pct = v => Math.max(0, Math.min(100, ((v - lo) / span) * 100));

    const posRows = g.positions.map(p => {
      const win = p.side === 'yes' ? p.modelProb : 1 - p.modelProb;
      const r = p.bracketRange;
      const inBracket = r && f.mean >= (r.lowF ?? -Infinity) && f.mean <= (r.highF ?? Infinity);
      const barStyle = r
        ? `position:absolute;top:0;height:100%;left:${pct(isFinite(r.lowF) ? r.lowF : lo)}%;width:${pct(isFinite(r.highF) ? r.highF : hi) - pct(isFinite(r.lowF) ? r.lowF : lo)}%;background:${inBracket ? 'rgba(46,204,113,0.22)' : 'rgba(243,156,18,0.18)'};border:1px solid ${inBracket ? 'rgba(46,204,113,0.5)' : 'rgba(243,156,18,0.45)'};border-radius:3px`
        : '';
      return `
        <tr>
          <td>${attributionTag(p)}</td>
          <td><span class="bracket">${p.bracketText || '—'}</span> ${sideTag(p.side)}</td>
          <td class="num">${p.shares.toFixed(0)}sh @ $${p.avgEntryPrice.toFixed(3)}</td>
          <td class="num">${fmt.pct0(win)}</td>
          <td class="num ${pnlClass(p.expectedValueUSD)}">${fmt.moneyPos(p.expectedValueUSD)}</td>
          <td>
            <div style="position:relative;height:14px;background:var(--bg-input);border-radius:3px;border:1px solid var(--border);overflow:hidden">
              <div style="${barStyle}"></div>
              <div title="ensemble mean" style="position:absolute;top:0;height:100%;left:calc(${pct(f.mean)}% - 1px);width:2px;background:#4c7dff"></div>
              <div title="p10" style="position:absolute;top:3px;height:8px;left:calc(${pct(f.p10)}% - 0.5px);width:1px;background:rgba(76,125,255,0.4)"></div>
              <div title="p90" style="position:absolute;top:3px;height:8px;left:calc(${pct(f.p90)}% - 0.5px);width:1px;background:rgba(76,125,255,0.4)"></div>
            </div>
          </td>
        </tr>
      `;
    }).join('');

    cards.push(`
      <div style="border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:10px;background:var(--bg-elev)">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:10px">
          <div>
            <div style="font-size:13px;font-weight:600">${g.city ?? '?'} <span class="dim" style="font-weight:400;font-size:12px">· ${g.eventTicker ?? ''}</span></div>
            <div class="dim" style="font-size:11px;margin-top:2px">Closes ${fmt.iso2local(g.closeTime)} · ${fmt.hours(g.hoursToClose)} away</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:13px"><span class="cyan">${fmt.temp(f.mean)}</span> <span class="dim">±${f.stddev.toFixed(1)}°</span></div>
            <div class="dim" style="font-size:11px">p10 ${fmt.temp(f.p10)} · p90 ${fmt.temp(f.p90)}</div>
          </div>
          <div style="text-align:right">
            <div class="dim" style="font-size:10px;text-transform:uppercase;letter-spacing:0.05em">Total</div>
            <div style="font-size:13px">${fmt.money(totalExp)} in · <span class="${pnlClass(totalEV)}">${fmt.moneyPos(totalEV)}</span> EV</div>
          </div>
        </div>
        <table style="font-size:12px">
          <thead><tr>
            <th></th><th>Bracket</th><th class="num">Shares @ entry</th>
            <th class="num">Win prob</th><th class="num">Exp. P&amp;L</th>
            <th style="width:35%">Forecast (blue=ensemble · green=in bracket · amber=outside)</th>
          </tr></thead>
          <tbody>${posRows}</tbody>
        </table>
      </div>
    `);
  }

  el.innerHTML = cards.join('');
}

// Three views:
//   "kalshi"      — ground-truth Kalshi account value (cash + portfolio)

//   "pnl-per-bot" — cumulative realized P&L, one line per bot
function renderEquity() {
  const view = document.getElementById('eq-view').value;
  const wrap = document.getElementById('equity-wrap');
  const legend = document.getElementById('equity-legend');
  const caption = document.getElementById('equity-caption');
  const hint = document.getElementById('equity-hint');
  const e = app.equity ?? {};

  let datasets = [], legendHtml = '', captionText = '', hintText = '', yFormat = v => '$' + v.toFixed(0);

  if (view === 'kalshi') {
    const k = e.kalshi ?? [];
    if (k.length === 0) {
      wrap.innerHTML = `<div class="empty">No Kalshi snapshots yet.<br>Dashboard logs one every ~10 min — leave it running and check back.</div>`;
      legend.innerHTML = ''; caption.textContent = ''; hint.textContent = '';
      if (app.equityChart) { app.equityChart.destroy(); app.equityChart = null; }
      return;
    }
    datasets = [
      { label: 'Portfolio value', data: k.map(p => ({ x: new Date(p.t), y: p.portfolioValueUSD })),
        borderColor: '#2ecc71', backgroundColor: 'rgba(46,204,113,0.10)', fill: true, tension: 0.15, pointRadius: 0, borderWidth: 2 },
      { label: 'Cash', data: k.map(p => ({ x: new Date(p.t), y: p.cashUSD })),
        borderColor: '#3ab7d4', backgroundColor: 'rgba(58,183,212,0.06)', fill: false, tension: 0.15, pointRadius: 0, borderWidth: 1.5, borderDash: [4,3] },
    ];
    legendHtml = `<span><span class="sw" style="background:#2ecc71"></span>Portfolio value</span><span><span class="sw" style="background:#3ab7d4"></span>Cash</span>`;
    captionText = `Ground-truth Kalshi account value — logged every 10 min by this dashboard while running.`;
    hintText = `${k.length} snapshot${k.length===1?'':'s'}`;
  } else if (view === 'pnl-combined') {
    const c = e.combinedPnl ?? [];
    if (c.length === 0) {
      wrap.innerHTML = '<div class="empty">No realized trades yet</div>';
      legend.innerHTML = ''; caption.textContent = ''; hint.textContent = '';
      if (app.equityChart) { app.equityChart.destroy(); app.equityChart = null; }
      return;
    }
    datasets = [
      { label: 'Combined P&L', data: c.map(p => ({ x: new Date(p.t), y: p.value })),
        borderColor: '#f39c12', backgroundColor: 'rgba(243,156,18,0.08)', fill: true, tension: 0.1, pointRadius: 0, borderWidth: 2 },
    ];
    legendHtml = `<span><span class="sw" style="background:#f39c12"></span>Combined cumulative P&amp;L</span>`;
    captionText = `Sum of realized P&L across both bots. Stitches across bot restarts since it's derived from per-trade pnl, not sim balance.`;
    hintText = `${c.length} fills`;
    yFormat = v => (v >= 0 ? '+$' : '-$') + Math.abs(v).toFixed(2);
  } else { // pnl-per-bot
    const i = e.intrinsicPnl ?? [], x = e.ensemblePnl ?? [];
    if (i.length + x.length === 0) {
      wrap.innerHTML = '<div class="empty">No realized trades yet</div>';
      legend.innerHTML = ''; caption.textContent = ''; hint.textContent = '';
      if (app.equityChart) { app.equityChart.destroy(); app.equityChart = null; }
      return;
    }
    if (i.length) datasets.push({ label: 'Intrinsic', data: i.map(p => ({ x: new Date(p.t), y: p.value })),
      borderColor: '#4c7dff', backgroundColor: 'rgba(76,125,255,0.08)', fill: false, tension: 0.1, pointRadius: 0, borderWidth: 2 });
    if (x.length) datasets.push({ label: 'Ensemble', data: x.map(p => ({ x: new Date(p.t), y: p.value })),
      borderColor: '#9b59b6', backgroundColor: 'rgba(155,89,182,0.08)', fill: false, tension: 0.1, pointRadius: 0, borderWidth: 2 });
    legendHtml = `<span><span class="sw" style="background:#4c7dff"></span>Intrinsic</span><span><span class="sw" style="background:#9b59b6"></span>Ensemble</span>`;
    captionText = `Per-bot cumulative realized P&L. Survives --fresh restarts because it's computed from CSV history.`;
    hintText = `${i.length+x.length} fills`;
    yFormat = v => (v >= 0 ? '+$' : '-$') + Math.abs(v).toFixed(2);
  }

  // Ensure the canvas exists (empty views may have replaced the wrap contents)
  if (!document.getElementById('equity-chart')) {
    wrap.innerHTML = '<canvas id="equity-chart"></canvas>';
  }
  if (app.equityChart) app.equityChart.destroy();
  app.equityChart = new Chart(document.getElementById('equity-chart').getContext('2d'), {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a2236', borderColor: '#252d3f', borderWidth: 1,
          callbacks: { label: ctx => `${ctx.dataset.label}: ${yFormat(ctx.parsed.y)}` },
        },
      },
      scales: {
        x: { type: 'time', time: { unit: 'hour' }, grid: { color: '#252d3f' }, ticks: { color: '#8b93a8', font: { size: 11 } } },
        y: { grid: { color: '#252d3f' }, ticks: { color: '#8b93a8', font: { size: 11 }, callback: yFormat } },
      },
    },
  });
  legend.innerHTML = legendHtml;
  caption.textContent = captionText;
  hint.textContent = hintText;
}

// ─── Header pills ─────────────────────────────────────────────────────
function renderPills() {
  const k = document.getElementById('pill-kalshi');
  const kt = document.getElementById('pill-kalshi-text');
  if (app.bots?.kalshiConfigured) {
    k.classList.remove('bad'); k.classList.add('ok');
    kt.innerHTML = app.portfolio?.configured && !app.portfolio?.error ? 'Kalshi <strong>live</strong>' : 'Kalshi configured';
  } else {
    k.classList.remove('ok'); k.classList.add('bad');
    kt.innerHTML = 'Kalshi <strong>not configured</strong>';
  }
  document.getElementById('pill-updated-text').textContent = 'updated ' + new Date().toLocaleTimeString();
}

// ─── Refresh pipeline ─────────────────────────────────────────────────
async function refreshAll() {
  const [bots, portfolio, positions, orders, equity] = await Promise.all([
    fetchJson('/api/bots'),
    fetchJson('/api/portfolio'),
    fetchJson('/api/positions'),
    fetchJson('/api/orders'),
    fetchJson('/api/equity'),
  ]);
  app.bots = bots;
  app.portfolio = portfolio;
  app.positions = positions?.positions ?? [];
  app.positionsSummary = positions?.summary ?? null;
  app.orders = orders?.orders ?? [];
  app.equity = equity;

  renderPills();
  renderTopCards();
  renderBotRow();
  renderPositions();
  renderCoverage();
  renderOrders();
  renderEquity();
}

// ─── Cities dropdown ──────────────────────────────────────────────────
async function loadCities() {
  const data = await fetchJson('/api/cities');
  app.cities = data?.cities ?? ['NYC'];
  const names = data?.names ?? {};
  const sel = document.getElementById('fc-city');
  sel.innerHTML = app.cities.map(c => `<option value="${c}">${c}${names[c] ? ' — '+names[c] : ''}</option>`).join('');
}

// ─── Wire filters ─────────────────────────────────────────────────────
function wireFilters() {
  for (const id of ['pos-bot','pos-city','pos-side','pos-sort']) {
    document.getElementById(id).addEventListener('input', renderPositions);
  }
  for (const id of ['tr-bot','tr-city','tr-outcome','tr-limit']) {
    document.getElementById(id).addEventListener('input', loadTrades);
  }
  document.getElementById('fc-refresh').addEventListener('click', loadForecast);
  document.getElementById('fc-city').addEventListener('change', loadForecast);
  document.getElementById('fc-days').addEventListener('change', loadForecast);
  document.getElementById('eq-view').addEventListener('change', renderEquity);
}

// ─── Boot ─────────────────────────────────────────────────────────────
const adapter = document.createElement('script');
adapter.src = 'https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js';
adapter.onload = async () => {
  await loadCities();
  wireFilters();
  await refreshAll();
  await loadTrades();
  await loadForecast();

  // Reasonable live cadence:
  //   - bot/portfolio/positions/orders: every 20s
  //   - trade CSV + equity: every 60s (cheap, but low change rate)
  //   - forecast: manual refresh + every 5min
  setInterval(refreshAll, 20_000);
  setInterval(loadTrades, 60_000);
  setInterval(loadForecast, 5 * 60_000);

  // SSE: refresh instantly when any state file changes
  try {
    const evt = new EventSource('/api/stream');
    evt.onmessage = e => {
      try { if (JSON.parse(e.data).type === 'state') refreshAll(); } catch {}
    };
  } catch {}
};
document.head.appendChild(adapter);
</script>

</body>
</html>
