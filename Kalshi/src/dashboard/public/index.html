<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Satriales Weather Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0e1a;
      --bg-card: #121828;
      --bg-elev: #1a2236;
      --border: #252d3f;
      --text: #e7e9f0;
      --text-dim: #8b93a8;
      --accent: #4c7dff;
      --green: #2ecc71;
      --red: #e74c3c;
      --yellow: #f39c12;
      --cyan: #3ab7d4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; font-size: 14px; line-height: 1.5; }
    body { padding: 20px 28px 40px; min-height: 100vh; }

    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
    header h1 .sub { color: var(--text-dim); font-weight: 400; margin-left: 10px; font-size: 14px; }
    #status { font-size: 12px; color: var(--text-dim); }
    #status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-right: 6px; vertical-align: middle; }
    #status.stale .dot { background: var(--red); }

    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
    .card .label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .card .value { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
    .card .sub { color: var(--text-dim); font-size: 12px; margin-top: 4px; }

    .green { color: var(--green); }
    .red { color: var(--red); }
    .yellow { color: var(--yellow); }
    .cyan { color: var(--cyan); }
    .dim { color: var(--text-dim); }

    section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 18px; margin-bottom: 18px; }
    section h2 { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; font-weight: 600; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; color: var(--text-dim); font-weight: 500; padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr.ladder-header td { background: var(--bg-elev); font-weight: 500; }
    tr.leg td { padding-left: 28px; color: var(--text-dim); }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .bracket { display: inline-block; padding: 2px 8px; border-radius: 4px; background: var(--bg-elev); font-size: 12px; font-family: 'SF Mono', Menlo, monospace; }
    .status-hit { color: var(--green); font-weight: 600; }
    .status-miss { color: var(--red); }

    #equity-wrap { position: relative; height: 280px; }
    .empty { color: var(--text-dim); text-align: center; padding: 30px; font-style: italic; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <h1>Satriales Weather Bot <span class="sub">Kalshi KXHIGH Ladder Strategy</span></h1>
  <div id="status"><span class="dot"></span><span id="status-text">Connecting...</span></div>
</header>

<div class="cards" id="cards"></div>

<section>
  <h2>Equity Curve</h2>
  <div id="equity-wrap"><canvas id="equity-chart"></canvas></div>
</section>

<div class="grid-2">
  <section>
    <h2>Open Ladders (<span id="open-count">0</span>)</h2>
    <div id="open-ladders"></div>
  </section>

  <section>
    <h2>Recent Resolutions (<span id="closed-count">0</span>)</h2>
    <div id="closed-ladders"></div>
  </section>
</div>

<script>
const fmt = {
  money: n => (n < 0 ? '-$' : '$') + Math.abs(n).toFixed(2),
  moneyPos: n => (n >= 0 ? '+' : '') + fmt.money(n),
  pct: n => (n * 100).toFixed(0) + '%',
  hours: n => n < 1 ? Math.round(n * 60) + 'm' : n.toFixed(1) + 'h',
  temp: n => n != null ? n.toFixed(0) + '°F' : '—',
};

const pnlClass = n => n > 0 ? 'green' : n < 0 ? 'red' : 'dim';

let equityChart = null;

async function fetchState() {
  try {
    const r = await fetch('/api/state');
    if (!r.ok) throw new Error('no state');
    return await r.json();
  } catch (e) {
    return null;
  }
}

async function fetchEquity() {
  try {
    const r = await fetch('/api/equity');
    return (await r.json()).points;
  } catch {
    return [];
  }
}

function renderCards(s) {
  const netRealized = s.closedLadders.reduce((a, c) => a + c.pnl, 0);
  const unrealized = 0; // we don't mark open positions
  const totalEquity = s.balance + s.deployed;
  const totalPctChange = ((totalEquity - s.startingBalance) / s.startingBalance) * 100;
  const winRate = (s.wins + s.losses) > 0 ? s.wins / (s.wins + s.losses) * 100 : null;

  const equityClass = totalPctChange > 0 ? 'green' : totalPctChange < 0 ? 'red' : '';

  document.getElementById('cards').innerHTML = `
    <div class="card">
      <div class="label">Total Equity</div>
      <div class="value ${equityClass}">${fmt.money(totalEquity)}</div>
      <div class="sub">${totalPctChange >= 0 ? '+' : ''}${totalPctChange.toFixed(1)}% from $${s.startingBalance.toFixed(0)}</div>
    </div>
    <div class="card">
      <div class="label">Available</div>
      <div class="value">${fmt.money(s.balance)}</div>
      <div class="sub">${fmt.money(s.deployed)} deployed</div>
    </div>
    <div class="card">
      <div class="label">Realized P&L</div>
      <div class="value ${pnlClass(netRealized)}">${fmt.moneyPos(netRealized)}</div>
      <div class="sub">${s.closedLadders.length} ladders resolved</div>
    </div>
    <div class="card">
      <div class="label">Win Rate (per leg)</div>
      <div class="value">${winRate != null ? winRate.toFixed(0) + '%' : '—'}</div>
      <div class="sub">${s.wins}W &bull; ${s.losses}L</div>
    </div>
    <div class="card">
      <div class="label">Open Positions</div>
      <div class="value">${s.openLadders.reduce((a, l) => a + l.legs.length, 0)}</div>
      <div class="sub">${s.openLadders.length} ladders</div>
    </div>
    <div class="card">
      <div class="label">Scans</div>
      <div class="value">${s.scansCompleted}</div>
      <div class="sub">${s.savedAt ? 'saved ' + timeAgo(new Date(s.savedAt)) : '—'}</div>
    </div>
  `;
}

function timeAgo(d) {
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  return Math.floor(s / 3600) + 'h ago';
}

function renderOpenLadders(s) {
  const el = document.getElementById('open-ladders');
  document.getElementById('open-count').textContent = s.openLadders.length;
  if (s.openLadders.length === 0) {
    el.innerHTML = '<div class="empty">No open positions</div>';
    return;
  }
  const rows = [];
  for (const ladder of s.openLadders.sort((a, b) => a.hoursToRes - b.hoursToRes)) {
    rows.push(`
      <tr class="ladder-header">
        <td><strong>${ladder.city}</strong> <span class="dim">${ladder.date}</span></td>
        <td class="num dim">forecast ${fmt.temp(ladder.forecastTempF)}${ladder.modelSpreadF ? ' ±' + ladder.modelSpreadF.toFixed(1) : ''}</td>
        <td class="num dim">${ladder.legs.length} leg${ladder.legs.length > 1 ? 's' : ''}</td>
        <td class="num">${fmt.money(ladder.cost)}</td>
        <td class="num ${ladder.hoursToRes < 2 ? 'yellow' : 'dim'}">${fmt.hours(ladder.hoursToRes)}</td>
      </tr>
    `);
    for (const leg of ladder.legs) {
      rows.push(`
        <tr class="leg">
          <td><span class="bracket">${leg.bracket}</span></td>
          <td class="num">${leg.shares}sh @ $${leg.entryPrice.toFixed(3)}</td>
          <td class="num dim">${fmt.pct(leg.prob)} prob</td>
          <td class="num green">+${fmt.pct(leg.edge)} edge</td>
          <td class="num dim">${Math.round(1 / leg.entryPrice)}:1</td>
        </tr>
      `);
    }
  }
  el.innerHTML = `<table>
    <thead><tr><th>Market</th><th class="num">Entry</th><th class="num">Prob</th><th class="num">Edge / Fcast</th><th class="num">Payoff / Res</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

function renderClosedLadders(s) {
  const el = document.getElementById('closed-ladders');
  const recent = s.closedLadders.slice(0, 20);
  document.getElementById('closed-count').textContent = s.closedLadders.length;
  if (recent.length === 0) {
    el.innerHTML = '<div class="empty">No resolved ladders yet</div>';
    return;
  }
  const rows = [];
  for (const ladder of recent) {
    rows.push(`
      <tr class="ladder-header">
        <td><strong>${ladder.city}</strong> <span class="dim">${ladder.date}</span></td>
        <td class="num">actual <strong>${fmt.temp(ladder.resolvedTempF)}</strong></td>
        <td class="num dim">${ladder.hits}/${ladder.total} hit</td>
        <td class="num">${fmt.money(ladder.cost)}</td>
        <td class="num ${pnlClass(ladder.pnl)}">${fmt.moneyPos(ladder.pnl)}</td>
      </tr>
    `);
    for (const leg of ladder.legs) {
      const icon = leg.status === 'won' ? '✓' : '✗';
      rows.push(`
        <tr class="leg">
          <td><span class="${leg.status === 'won' ? 'status-hit' : 'status-miss'}">${icon}</span> <span class="bracket">${leg.bracket}</span></td>
          <td class="num dim">${leg.shares}sh @ $${leg.entryPrice.toFixed(3)}</td>
          <td class="num dim">${fmt.money(leg.cost)}</td>
          <td colspan="2" class="num ${pnlClass(leg.pnl)}">${fmt.moneyPos(leg.pnl)}</td>
        </tr>
      `);
    }
  }
  el.innerHTML = `<table>
    <thead><tr><th>Market</th><th class="num">Actual</th><th class="num">Hits</th><th class="num">Cost</th><th class="num">P&L</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

function renderEquity(points) {
  const ctx = document.getElementById('equity-chart').getContext('2d');
  const labels = points.map(p => new Date(p.t));
  const data = points.map(p => p.balance);
  if (equityChart) equityChart.destroy();
  equityChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Balance',
        data,
        borderColor: '#4c7dff',
        backgroundColor: 'rgba(76, 125, 255, 0.1)',
        fill: true,
        tension: 0.2,
        pointRadius: 0,
        borderWidth: 2,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a2236',
          borderColor: '#252d3f',
          borderWidth: 1,
          callbacks: {
            label: (ctx) => '$' + ctx.parsed.y.toFixed(2),
          },
        },
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'hour' },
          grid: { color: '#252d3f' },
          ticks: { color: '#8b93a8', font: { size: 11 } },
        },
        y: {
          grid: { color: '#252d3f' },
          ticks: {
            color: '#8b93a8',
            font: { size: 11 },
            callback: v => '$' + v.toFixed(0),
          },
        },
      },
    },
  });
}

async function refresh() {
  const [state, equity] = await Promise.all([fetchState(), fetchEquity()]);
  if (!state) {
    document.getElementById('status').classList.add('stale');
    document.getElementById('status-text').textContent = 'No state file — bot not running?';
    return;
  }
  document.getElementById('status').classList.remove('stale');
  document.getElementById('status-text').textContent = 'Live';

  renderCards(state);
  renderOpenLadders(state);
  renderClosedLadders(state);
  renderEquity(equity);
}

// Chart.js needs a time adapter for type: 'time'. Load it.
const adapter = document.createElement('script');
adapter.src = 'https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js';
adapter.onload = () => {
  refresh();

  // Listen to SSE for state changes
  const evt = new EventSource('/api/stream');
  evt.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'state') refresh();
  };
  evt.onerror = () => {
    // Fall back to polling
    setInterval(refresh, 5000);
  };
};
document.head.appendChild(adapter);
</script>

</body>
</html>
